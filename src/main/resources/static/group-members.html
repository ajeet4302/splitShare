<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Group Members | SplitShare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/group-members.css">

</head>

<body>

<div class="wrapper">

    <aside class="sidebar">

        <div>

            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <h2>SplitShare</h2>
            </div>

            <ul>

                <li>
                    <a href="dashboard.html">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li class="active">
                    <a href="groups.html">
                        <i class="fa-solid fa-users"></i>
                        Groups
                    </a>
                </li>

                <li>
                    <a href="add-expense.html">
                        <i class="fa-solid fa-plus-circle"></i>
                        Add Expense
                    </a>
                </li>

                <li>
                    <a href="expenses.html">
                        <i class="fa-solid fa-money-bill-wave"></i>
                        Expenses
                    </a>
                </li>

                <li>
                    <a href="balance.html">
                        <i class="fa-solid fa-scale-balanced"></i>
                        Balance
                    </a>
                </li>

                <li>
                    <a href="settlement.html">
                        <i class="fa-solid fa-handshake"></i>
                        Settlement
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <i class="fa-solid fa-user"></i>
                        Profile
                    </a>
                </li>

            </ul>

        </div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </aside>

    <main class="main-content">

        <div class="page-header">

            <div>

                <h2>Group Members</h2>

                <p>Manage members of the selected group.</p>

            </div>

        </div>

        <div class="member-card">

            <div class="row mb-4">

                <div class="col-md-9">

                    <input
                        type="email"
                        id="memberEmail"
                        class="form-control"
                        placeholder="Enter member email">

                </div>

                <div class="col-md-3">

                    <button
                        class="btn btn-primary w-100"
                        id="addMemberBtn">

                        <i class="fa-solid fa-user-plus"></i>

                        Add Member

                    </button>

                </div>

            </div>

            <table class="table table-hover">

                <thead>

                <tr>

                    <th>#</th>

                    <th>Member Name</th>

                </tr>

                </thead>

                <tbody id="memberTable">

                    <tr>

                        <td colspan="2" class="text-center">

                            Loading Members...

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </main>

</div>

<script src="js/group-members.js"></script>

</body>

</html>
