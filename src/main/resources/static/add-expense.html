<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Add Expense | SplitShare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/add-expense.css">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div>

            <div class="logo">

                <i class="fa-solid fa-wallet"></i>

                <h2>SplitShare</h2>

            </div>

            <ul>

                <li>
                    <a href="dashboard.html">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="groups.html">
                        <i class="fa-solid fa-users"></i>
                        Groups
                    </a>
                </li>

                <li class="active">
                    <a href="add-expense.html">
                        <i class="fa-solid fa-money-bill-wave"></i>
                        Add Expense
                    </a>
                </li>

                <li>
                    <a href="balance.html">
                        <i class="fa-solid fa-scale-balanced"></i>
                        Balance
                    </a>
                </li>

                <li>
                    <a href="settlement.html">
                        <i class="fa-solid fa-handshake"></i>
                        Settlement
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <i class="fa-solid fa-user"></i>
                        Profile
                    </a>
                </li>

            </ul>

        </div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <div class="page-header">

            <div>

                <h2>Add New Expense</h2>

                <p>Create a new expense for your group.</p>

            </div>

        </div>

        <div class="expense-card">

            <form id="expenseForm">

                <!-- Row 1 -->

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Expense Title
                        </label>

                        <input
                                type="text"
                                id="title"
                                class="form-control"
                                placeholder="Dinner, Fuel, Hotel..."
                                required>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Amount
                        </label>

                        <input
                                type="number"
                                id="amount"
                                class="form-control"
                                placeholder="₹ 0.00"
                                required>

                    </div>

                </div>

                <!-- Row 2 -->

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Group
                        </label>

                        <select
                                id="groupSelect"
                                class="form-control"
                                required>

                            <option value="">
                                Select Group
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Split Type
                        </label>

                        <select
                                id="splitType"
                                class="form-control"
                                required>

                            <option value="">
                                Select Split Type
                            </option>

                            <option value="EQUAL">
                                Equal
                            </option>

                            <option value="EXACT">
                                Exact
                            </option>

                            <option value="PERCENTAGE">
                                Percentage
                            </option>

                        </select>

                    </div>

                </div>

                <!-- Description -->

                <div class="mb-4">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea
                            id="description"
                            rows="5"
                            class="form-control"
                            placeholder="Write expense details..."></textarea>

                </div>

                <!-- Buttons -->

                <div class="button-group">

                    <button
                            type="submit"
                            class="btn btn-primary">

                        <i class="fa-solid fa-plus"></i>

                        Save Expense

                    </button>

                    <button
                            type="reset"
                            class="btn btn-secondary">

                        Clear

                    </button>

                </div>

            </form>

        </div>

    </main>

</div>

<script src="js/add-expense.js"></script>
<script src="js/common.js"></script>

</body>

</html>
